<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PUNKU — Prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   PUNKU — Sistema de diseño (tokens)
   Verdes territorio + terracota/ocre + dorado luminoso (la puerta)
   ============================================================ */
:root{
  /* Tierra / fondo cálido */
  --sand-50:#FBF8F2;  --sand-100:#F4ECDD;  --sand-200:#EADAC4;  --sand-300:#DEC8A8;
  --ink:#23201A;      --ink-soft:#5E554734; /* not used */
  --ink-70:#5C5347;   --ink-50:#8B8275;
  /* Verde naturaleza/territorio (primario ciudadano) */
  --green-800:#234E3A; --green-700:#2E6B4E; --green-600:#357A58; --green-500:#4A9B72;
  --green-300:#9AD0B2; --green-100:#DCEEE3; --green-50:#EDF6F0;
  /* Terracota / ocre andino */
  --terra-700:#9A4A2C; --terra-600:#B65A36; --terra-500:#C56B3F; --terra-300:#E7AC8A;
  --terra-100:#F6E2D5; --terra-50:#FBEFE7;
  /* Dorado luminoso (puerta / acento) */
  --gold-600:#D08E2A; --gold-500:#E8A13C; --gold-400:#F4B954; --gold-300:#F9CE7C;
  --gold-200:#FBE6BC; --gold-100:#FDF3DD;
  /* Emergencia (rojo serio) */
  --red-700:#8F2A20; --red-600:#B23A2E; --red-500:#C84A3C; --red-100:#F6DAD4; --red-50:#FBEAE6;
  /* CRM neutro (más sobrio, fresco) */
  --slate-50:#F7F8F8; --slate-100:#EDF0F0; --slate-200:#DCE2E2; --slate-300:#C3CCCC;
  --slate-400:#9AA5A4; --slate-500:#6B7675; --slate-600:#4E5857; --slate-700:#36403F;
  --slate-900:#1A211F;

  --radius: 18px;
  --radius-lg: 26px;
  --shadow-sm: 0 1px 2px rgba(35,32,26,.06), 0 2px 8px rgba(35,32,26,.05);
  --shadow-md: 0 6px 20px rgba(35,32,26,.10), 0 2px 6px rgba(35,32,26,.06);
  --shadow-lg: 0 18px 50px rgba(35,32,26,.16), 0 6px 18px rgba(35,32,26,.08);
  --font-head:'Sora', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 12% -8%, #F3F8EF 0%, rgba(243,248,239,0) 55%),
    radial-gradient(1100px 650px at 100% 0%, #FBEFE4 0%, rgba(251,239,228,0) 50%),
    var(--sand-50);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}
h1,h2,h3,h4{font-family:var(--font-head);margin:0;font-weight:700;letter-spacing:-0.02em;}
::selection{background:var(--gold-200);}

/* ---- App stage ---- */
#root{min-height:100vh;}
.stage{
  min-height:100vh;
  display:flex;flex-direction:column;
}

/* ---- Top control bar ---- */
.topbar{
  position:sticky;top:0;z-index:60;
  display:flex;align-items:center;gap:16px;
  padding:12px 22px;
  background:rgba(251,248,242,.82);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(35,32,26,.07);
}
.brand{display:flex;align-items:center;gap:11px;}
.brand-name{font-family:var(--font-head);font-weight:800;font-size:19px;letter-spacing:.01em;}
.brand-name .k{color:var(--green-700);}
.brand-tag{font-size:11px;color:var(--ink-50);font-weight:500;margin-top:-2px;letter-spacing:.02em;}

.seg{display:inline-flex;background:var(--sand-100);border-radius:999px;padding:4px;gap:2px;border:1px solid rgba(35,32,26,.06);}
.seg button{
  font-family:var(--font-head);font-weight:600;font-size:13.5px;
  padding:8px 16px;border-radius:999px;color:var(--ink-70);
  display:inline-flex;align-items:center;gap:7px;transition:all .18s ease;white-space:nowrap;
}
.seg button.active{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);}
.seg button:not(.active):hover{color:var(--ink);}

.topbar .spacer{flex:1;}
.lang{display:inline-flex;background:var(--sand-100);border-radius:999px;padding:3px;border:1px solid rgba(35,32,26,.06);}
.lang button{font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;color:var(--ink-50);font-family:var(--font-head);letter-spacing:.03em;}
.lang button.active{background:var(--green-700);color:#fff;}

.jump{position:relative;}
.jump-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-70);
  background:#fff;border:1px solid rgba(35,32,26,.10);border-radius:999px;padding:8px 14px;box-shadow:var(--shadow-sm);}
.jump-menu{position:absolute;right:0;top:46px;background:#fff;border:1px solid rgba(35,32,26,.1);border-radius:16px;
  box-shadow:var(--shadow-lg);padding:8px;width:268px;max-height:70vh;overflow:auto;z-index:80;}
.jump-menu .grp{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-50);padding:10px 10px 4px;}
.jump-menu button{display:flex;width:100%;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13.5px;color:var(--ink-70);font-weight:500;text-align:left;}
.jump-menu button:hover{background:var(--sand-50);color:var(--ink);}
.jump-menu button.cur{background:var(--green-50);color:var(--green-800);font-weight:600;}
.jump-menu .num{font-size:11px;font-weight:700;color:var(--ink-50);font-family:var(--font-head);min-width:24px;}

/* ---- Stage body ---- */
.stage-body{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px 80px;}

/* ---- Phone frame ---- */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;}
.phone{
  width:390px;height:820px;border-radius:54px;
  background:#1c1a17;
  padding:13px;
  box-shadow:var(--shadow-lg), inset 0 0 0 2px rgba(255,255,255,.04);
  position:relative;flex:none;
}
.phone-screen{
  width:100%;height:100%;border-radius:42px;overflow:hidden;
  background:var(--sand-50);position:relative;
  display:flex;flex-direction:column;
}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:30px;background:#1c1a17;border-radius:18px;z-index:40;}
.statusbar{height:46px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;font-size:13px;font-weight:600;color:var(--ink);z-index:30;}
.statusbar .dots{display:flex;align-items:center;gap:6px;}
.screen-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;}
.screen-scroll::-webkit-scrollbar{width:0;}

/* ---- Browser window (CRM) ---- */
.browser{
  width:min(1180px,100%);border-radius:16px;overflow:hidden;background:#fff;
  box-shadow:var(--shadow-lg);border:1px solid var(--slate-200);
}
.browser-bar{display:flex;align-items:center;gap:14px;padding:11px 16px;background:var(--slate-100);border-bottom:1px solid var(--slate-200);}
.browser-bar .lights{display:flex;gap:7px;}
.browser-bar .lights i{width:12px;height:12px;border-radius:50%;display:block;}
.browser-url{flex:1;background:#fff;border:1px solid var(--slate-200);border-radius:8px;padding:6px 12px;font-size:12.5px;color:var(--slate-500);display:flex;align-items:center;gap:8px;max-width:420px;}
.browser-body{height:740px;overflow:auto;background:var(--slate-50);}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-head);
  font-weight:600;border-radius:16px;transition:transform .12s ease, box-shadow .18s ease, background .18s ease;}
.btn:active{transform:translateY(1px) scale(.995);}
.btn-lg{font-size:18px;padding:18px 22px;width:100%;}
.btn-green{background:var(--green-700);color:#fff;box-shadow:0 6px 16px rgba(46,107,78,.28);}
.btn-green:hover{background:var(--green-800);}
.btn-gold{background:linear-gradient(180deg,var(--gold-400),var(--gold-500));color:#5a3d0c;box-shadow:0 8px 20px rgba(232,161,60,.34);}
.btn-gold:hover{filter:brightness(1.03);}
.btn-red{background:var(--red-600);color:#fff;box-shadow:0 6px 16px rgba(178,58,46,.26);}
.btn-red:hover{background:var(--red-700);}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid rgba(35,32,26,.12);box-shadow:var(--shadow-sm);}
.btn-ghost:hover{border-color:rgba(35,32,26,.24);}

.fade-in{animation:fadeIn .45s ease;}
@media (prefers-reduced-motion: reduce){ .fade-in{animation:none;} }
@keyframes fadeIn{from{transform:translateY(10px);}to{transform:none;}}

/* citizen content base */
.cz{padding:8px 22px 34px;}
.cz h1{font-size:27px;line-height:1.15;}
.cz p{line-height:1.5;}
.progress-wrap{padding:14px 22px 4px;}
.progress-track{height:9px;background:var(--sand-200);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green-500),var(--green-700));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.1,1);}
.progress-label{font-size:12.5px;font-weight:600;color:var(--green-700);margin-top:8px;display:flex;align-items:center;gap:6px;font-family:var(--font-head);}

.scrim{position:absolute;inset:0;background:rgba(20,18,14,.5);z-index:50;display:flex;align-items:center;justify-content:center;}

/* =================== CIUDADANO — componentes =================== */
.phone-caption{font-size:12.5px;color:var(--ink-50);font-weight:600;font-family:var(--font-head);}

.cat-card{display:flex;flex-direction:column;align-items:flex-start;gap:12px;background:#fff;border:1.5px solid rgba(35,32,26,.08);
  border-radius:20px;padding:15px 14px;text-align:left;box-shadow:var(--shadow-sm);transition:transform .14s ease, border-color .14s ease, box-shadow .18s ease;min-height:118px;}
.cat-card:hover{transform:translateY(-3px);border-color:var(--cc);box-shadow:0 10px 24px rgba(35,32,26,.12);}
.cat-card:active{transform:translateY(0);}
.cat-card span{font-family:var(--font-head);font-weight:600;font-size:14px;line-height:1.2;color:var(--ink);}
.cat-ico{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex:none;}
.cat-ico.sm{width:40px;height:40px;border-radius:12px;}

.opt-row{display:flex;align-items:center;gap:13px;background:#fff;border:1.5px solid rgba(35,32,26,.08);
  border-radius:16px;padding:15px 16px;text-align:left;box-shadow:var(--shadow-sm);transition:all .14s ease;}
.opt-emoji{font-size:26px;line-height:1;flex:none;width:34px;text-align:center;}
.opt-label{flex:1;font-size:15px;font-weight:500;color:var(--ink);line-height:1.25;}
.opt-row svg{color:var(--ink-50);transition:transform .14s ease,color .14s ease;flex:none;}
.opt-row:hover{border-color:var(--cc);transform:translateX(3px);}
.opt-row:hover svg{color:var(--cc);transform:translateX(2px);}

.fld-label{display:block;font-size:13px;font-weight:600;color:var(--ink-70);font-family:var(--font-head);margin:16px 0 7px;}
.fld{display:flex;align-items:center;gap:2px;background:#fff;border:1.5px solid rgba(35,32,26,.12);border-radius:14px;padding-left:14px;
  box-shadow:var(--shadow-sm);transition:border-color .15s ease;}
.fld:focus-within{border-color:var(--green-500);}
.ta{width:100%;background:#fff;border:1.5px solid rgba(35,32,26,.12);border-radius:14px;padding:14px;font-size:15.5px;color:var(--ink);
  outline:none;resize:none;line-height:1.5;margin-top:8px;box-shadow:var(--shadow-sm);font-family:var(--font-body);}
.ta:focus{border-color:var(--green-500);}
.audio-btn{display:flex;align-items:center;gap:9px;margin-top:12px;background:var(--green-50);color:var(--green-800);
  border:1.5px dashed var(--green-300);border-radius:12px;padding:12px 16px;font-weight:600;font-size:14px;width:100%;justify-content:center;font-family:var(--font-head);}
.stepper-btn{width:52px;height:52px;border-radius:50%;background:#fff;border:1.5px solid rgba(35,32,26,.14);font-size:26px;color:var(--green-700);
  font-weight:600;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;line-height:1;}
.stepper-btn:hover{border-color:var(--green-500);}
.chip{border:1.5px solid rgba(35,32,26,.12);border-radius:999px;padding:8px 16px;font-size:14px;font-weight:600;box-shadow:var(--shadow-sm);font-family:var(--font-head);}

.privacy-note{display:flex;gap:10px;background:var(--green-50);border-radius:14px;padding:14px;margin-top:18px;font-size:12.8px;color:var(--green-800);line-height:1.45;}

/* Paso aspiración (A1·Goal) — tocar, no leer */
.goal-opt{display:flex;align-items:center;gap:13px;background:#fff;border:1.5px solid rgba(35,32,26,.10);border-radius:16px;
  padding:15px 16px;text-align:left;box-shadow:var(--shadow-sm);transition:all .14s ease;}
.goal-opt .goal-emoji{font-size:26px;line-height:1;flex:none;width:34px;text-align:center;}
.goal-opt .goal-label{flex:1;font-size:15.5px;font-weight:600;color:var(--ink);font-family:var(--font-head);}
.goal-opt .goal-check{color:#fff;background:var(--green-600);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;}
.goal-opt:hover{border-color:var(--cc);transform:translateX(3px);}
.goal-opt.on{border-color:var(--green-600);background:var(--green-50);}
.goal-alt{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.goal-alt button{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-50);
  background:var(--sand-100);border-radius:999px;padding:8px 13px;font-family:var(--font-head);transition:all .14s;}
.goal-alt button:hover{color:var(--ink-70);}
.goal-alt button.on{background:var(--green-100);color:var(--green-800);}
.goal-urg-q{font-family:var(--font-head);font-weight:700;font-size:16px;color:var(--ink);margin:24px 0 12px;}
.urg-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;background:#fff;border:2px solid rgba(35,32,26,.10);
  border-radius:15px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm);transition:all .14s;}
.urg-opt .urg-emoji{font-size:22px;line-height:1;}
.urg-opt .urg-lab{font-size:12.5px;font-weight:600;color:var(--ink-70);font-family:var(--font-head);line-height:1.2;}
.urg-opt:hover{border-color:var(--sand-300);}
.urg-opt.on{border-color:var(--uc);background:var(--ub);}
.urg-opt.on .urg-lab{color:var(--ink);}

.proc-orb{animation:breathe 2.4s ease-in-out infinite;filter:drop-shadow(0 10px 24px rgba(232,161,60,.28));}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.mini-spin{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Recognition */
.rec-bg{background:
  radial-gradient(420px 300px at 50% 4%, rgba(244,185,84,0) 0%, rgba(244,185,84,0) 100%),
  var(--sand-50);transition:background 1.1s ease;}
.rec-bg.lit{background:
  radial-gradient(460px 320px at 50% 2%, rgba(251,230,188,.85) 0%, rgba(251,230,188,0) 62%),
  var(--sand-50);}
.urgent-pill{display:inline-flex;align-items:center;gap:6px;background:var(--red-600);color:#fff;font-weight:700;font-size:11.5px;
  letter-spacing:.08em;padding:5px 12px;border-radius:999px;font-family:var(--font-head);}
.rec-code-card{background:linear-gradient(180deg,#fff,var(--gold-100));border:1.5px solid var(--gold-300);border-radius:20px;
  padding:18px;text-align:center;margin-top:22px;box-shadow:0 12px 30px rgba(232,161,60,.20);}
.copy-btn{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:#fff;border:1.5px solid var(--gold-300);
  color:var(--gold-600);font-weight:700;font-size:13.5px;padding:9px 18px;border-radius:999px;font-family:var(--font-head);box-shadow:var(--shadow-sm);}
.copy-btn:hover{background:var(--gold-100);}
.rec-rows{background:#fff;border:1px solid rgba(35,32,26,.08);border-radius:18px;margin-top:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
.rec-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(35,32,26,.06);}
.rec-row:last-child{border-bottom:none;}
.rec-row-ico{width:34px;height:34px;border-radius:10px;background:var(--sand-100);display:flex;align-items:center;justify-content:center;color:var(--ink-70);flex:none;}
.rec-row-label{font-size:13px;color:var(--ink-50);font-weight:500;flex:none;width:96px;}
.rec-row-val{font-size:14.5px;font-weight:600;color:var(--ink);margin-left:auto;text-align:right;}
.status-dot{display:inline-flex;align-items:center;gap:7px;}
.status-dot span{width:8px;height:8px;border-radius:50%;background:var(--green-500);box-shadow:0 0 0 3px var(--green-100);}
.rec-need{background:var(--sand-100);border-radius:16px;padding:15px 16px;margin-top:14px;}

/* Track / timeline */
.track-head{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(35,32,26,.08);border-radius:16px;padding:13px;box-shadow:var(--shadow-sm);}
.timeline{margin-top:18px;}
.tl-item{display:flex;gap:14px;}
.tl-rail{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;
  background:var(--sand-200);border:2px solid var(--sand-300);}
.tl-line{width:2.5px;flex:1;min-height:26px;background:var(--sand-200);margin:2px 0;border-radius:2px;}
.tl-item.done .tl-dot{background:var(--green-600);border-color:var(--green-600);}
.tl-item.done .tl-line{background:var(--green-300);}
.tl-item.cur .tl-dot{background:var(--gold-400);border-color:var(--gold-200);}
.tl-body{padding-bottom:20px;padding-top:3px;}
.tl-title{font-family:var(--font-head);font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.tl-item.todo .tl-title{color:var(--ink-50);}
.tl-now{background:var(--gold-200);color:var(--gold-600);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.05em;}
.tl-desc{font-size:13px;color:var(--ink-70);margin-top:3px;line-height:1.45;}
.tl-item.todo .tl-desc{color:var(--ink-50);}
.pulse-dot{width:11px;height:11px;border-radius:50%;background:#fff;animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.7);}50%{box-shadow:0 0 0 5px rgba(255,255,255,0);}}

/* Emergency */
.emerg-screen{min-height:100%;background:var(--red-50);}
.emerg-top{background:linear-gradient(135deg,var(--red-600),var(--red-700));color:#fff;padding:18px 20px;display:flex;align-items:center;gap:14px;}
.photo-btn{display:flex;align-items:center;gap:9px;margin-top:14px;background:#fff;color:var(--red-600);border:1.5px dashed var(--red-100);
  border-radius:12px;padding:13px 16px;font-weight:600;font-size:14px;width:100%;justify-content:center;font-family:var(--font-head);}

/* =================== CRM =================== */
.crm-shell{display:flex;min-height:740px;font-size:14px;color:var(--slate-700);}
.crm-rail{width:230px;flex:none;background:#fff;border-right:1px solid var(--slate-200);padding:18px 14px;display:flex;flex-direction:column;}
.crm-rail .brand-name{font-size:18px;}
.crm-rail .brand-tag{color:var(--slate-400);}
.rail-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--slate-500);font-family:var(--font-head);text-align:left;width:100%;transition:all .14s;}
.rail-item:hover{background:var(--slate-50);color:var(--slate-700);}
.rail-item.active{background:var(--green-50);color:var(--green-800);}
.rail-foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px 4px;border-top:1px solid var(--slate-100);}
.rail-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--font-head);flex:none;}

.crm-main{flex:1;padding:26px 30px;overflow:auto;}
.crm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:20px;}
.crm-search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--slate-200);border-radius:11px;padding:9px 13px;color:var(--slate-400);min-width:280px;}
.crm-search input{border:none;outline:none;background:transparent;font-size:13.5px;color:var(--slate-700);flex:1;}
.crm-filters{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px;}
.fgroup{display:flex;align-items:center;gap:9px;}
.fgroup-label{font-size:12px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.06em;}
.fgroup-opts{display:flex;gap:5px;background:var(--slate-100);border-radius:9px;padding:3px;}
.fchip{font-size:12.5px;font-weight:600;color:var(--slate-500);padding:6px 11px;border-radius:7px;font-family:var(--font-head);transition:all .12s;}
.fchip.on{background:#fff;color:var(--slate-800);box-shadow:var(--shadow-sm);}
.csv-btn{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--slate-500);border:1px solid var(--slate-200);background:#fff;border-radius:9px;padding:8px 13px;font-family:var(--font-head);}
.csv-btn:hover{color:var(--green-700);border-color:var(--green-300);}

.crm-table{background:#fff;border:1px solid var(--slate-200);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
.crm-tr{display:grid;grid-template-columns:150px 1.6fr 1.2fr 0.8fr 1fr 0.8fr;align-items:center;gap:14px;padding:14px 18px;}
.crm-th{background:var(--slate-50);border-bottom:1px solid var(--slate-200);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--slate-400);}
.crm-row{text-align:left;width:100%;border-bottom:1px solid var(--slate-100);transition:background .12s;}
.crm-row:hover{background:var(--slate-50);}
.crm-row:last-child{border-bottom:none;}
.crm-row.urgent{background:linear-gradient(90deg,rgba(178,58,46,.05),transparent 60%);box-shadow:inset 3px 0 0 var(--red-600);}
.crm-row.urgent:hover{background:linear-gradient(90deg,rgba(178,58,46,.09),transparent 60%);}
.mono{font-family:'Sora',monospace;font-size:12.5px;font-weight:700;color:var(--slate-600);letter-spacing:.01em;}
.mini-cat{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;}
.mini-cat.lg{width:54px;height:54px;border-radius:15px;}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;font-family:var(--font-head);white-space:nowrap;}
.utag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;font-family:var(--font-head);display:inline-flex;align-items:center;gap:5px;}
.utag.alta{background:var(--red-100);color:var(--red-700);}
.utag.media{background:var(--gold-200);color:var(--gold-600);}
.utag.baja{background:var(--slate-100);color:var(--slate-500);}

.crm-back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--slate-500);font-family:var(--font-head);margin-bottom:18px;}
.crm-back:hover{color:var(--green-700);}
.det-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:22px;}
.canal-tag{font-size:11.5px;font-weight:600;color:var(--slate-500);background:var(--slate-100);padding:4px 10px;border-radius:999px;font-family:var(--font-head);}
.det-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start;}
.card{background:#fff;border:1px solid var(--slate-200);border-radius:15px;padding:18px;box-shadow:var(--shadow-sm);}
.card-eyebrow{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--slate-400);font-family:var(--font-head);}
.conf{display:flex;align-items:center;gap:11px;margin-top:14px;}
.conf-bar{flex:1;height:8px;background:var(--slate-100);border-radius:99px;overflow:hidden;}
.conf-bar div{height:100%;background:linear-gradient(90deg,var(--green-500),var(--green-700));border-radius:99px;}
.ai-note{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--slate-500);background:var(--slate-50);border-radius:10px;padding:10px 12px;}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-top:14px;}
.kv-label{font-size:11.5px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:.04em;}
.kv-val{font-size:14px;font-weight:600;color:var(--slate-700);margin-top:4px;}
.fac-chip{font-size:12px;font-weight:600;color:var(--green-800);background:var(--green-50);border:1px solid var(--green-100);padding:5px 11px;border-radius:999px;}
.contact-card{background:linear-gradient(180deg,#fff,var(--slate-50));}
.reveal-btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--green-700);border:1px solid var(--green-300);background:#fff;border-radius:9px;padding:8px 13px;font-family:var(--font-head);flex:none;}

.state-rail{display:flex;flex-direction:column;gap:0;margin:14px 0 16px;}
.sr-item{display:flex;align-items:center;gap:11px;padding:5px 0;position:relative;}
.sr-dot{width:22px;height:22px;border-radius:50%;background:var(--slate-200);display:flex;align-items:center;justify-content:center;color:#fff;flex:none;z-index:2;}
.sr-item.done .sr-dot{background:var(--green-600);}
.sr-item.cur .sr-dot{background:var(--gold-400);box-shadow:0 0 0 4px var(--gold-100);}
.sr-item:not(:last-child)::before{content:'';position:absolute;left:10.5px;top:22px;height:14px;width:2px;background:var(--slate-200);}
.sr-item.done:not(:last-child)::before{background:var(--green-300);}
.sr-label{font-size:13.5px;font-weight:600;color:var(--slate-400);}
.sr-item.done .sr-label,.sr-item.cur .sr-label{color:var(--slate-700);}
.advance-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--green-700);color:#fff;border-radius:11px;padding:12px;font-weight:600;font-size:14px;font-family:var(--font-head);box-shadow:0 4px 12px rgba(46,107,78,.22);transition:background .15s;}
.advance-btn:hover{background:var(--green-800);}
.closed-note{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--green-700);font-weight:600;font-size:14px;background:var(--green-50);border-radius:11px;padding:12px;}
.crm-ta{width:100%;margin-top:10px;border:1px solid var(--slate-200);border-radius:10px;padding:10px 12px;font-size:13px;resize:none;outline:none;font-family:var(--font-body);color:var(--slate-700);}
.crm-ta:focus{border-color:var(--green-400);}
.crm-select{width:100%;border:1px solid var(--slate-200);border-radius:10px;padding:11px 12px;font-size:13.5px;color:var(--slate-700);outline:none;background:#fff;font-family:var(--font-body);}
.derive-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;background:#fff;color:var(--terra-600);border:1.5px solid var(--terra-300);border-radius:11px;padding:11px;font-weight:600;font-size:13.5px;font-family:var(--font-head);}
.derive-btn:hover{background:var(--terra-50);}
.impact-note{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--green-800);background:var(--green-50);border-radius:12px;padding:13px 14px;line-height:1.4;}
.crm-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slate-900);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-lg);z-index:90;}
.crm-toast svg{color:var(--green-300);}

/* =================== BORRADOR (B2) =================== */
.draft-card{margin-top:18px;background:#fff;border:1px solid var(--slate-200);border-radius:15px;box-shadow:var(--shadow-sm);overflow:hidden;}
.draft-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:18px 20px;
  background:linear-gradient(135deg,#fff, #F4F8F5);border-bottom:1px solid var(--slate-200);}
.draft-stamp{width:34px;height:34px;border-radius:10px;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;}
.draft-actions{display:flex;gap:8px;flex:none;}
.draft-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;font-family:var(--font-head);border-radius:10px;padding:9px 14px;transition:all .14s;}
.draft-btn.ghost{background:#fff;border:1px solid var(--slate-200);color:var(--slate-600);}
.draft-btn.ghost:hover{border-color:var(--green-300);color:var(--green-700);}
.draft-btn.solid{background:var(--green-700);color:#fff;box-shadow:0 4px 12px rgba(46,107,78,.22);}
.draft-btn.solid:hover{background:var(--green-800);}
.draft-legend{display:flex;gap:22px;padding:11px 20px;border-bottom:1px solid var(--slate-100);font-size:12px;color:var(--slate-500);font-weight:500;}
.draft-legend span{display:inline-flex;align-items:center;gap:7px;}
.draft-legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.draft-legend .dot.g{background:var(--green-500);}
.draft-legend .dot.a{background:var(--gold-400);}
.draft-body{padding:18px 20px 22px;}
.draft-tag{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:6px 12px;border-radius:99px;font-family:var(--font-head);margin-bottom:8px;}
.draft-tag.b1{background:var(--green-50);color:var(--green-700);}
.draft-tag.b2{background:var(--gold-100);color:var(--gold-600);margin-top:22px;}
.df-table{border:1px solid var(--slate-200);border-radius:12px;overflow:hidden;}
.df-row{display:grid;grid-template-columns:240px 1fr;gap:18px;padding:12px 16px;border-bottom:1px solid var(--slate-100);align-items:start;}
.df-row:last-child{border-bottom:none;}
.df-row.filled{background:linear-gradient(90deg, rgba(74,155,114,.05), transparent 42%);}
.df-row.pending{background:linear-gradient(90deg, rgba(244,185,84,.08), transparent 42%);}
.df-label{font-size:12.5px;font-weight:600;color:var(--slate-600);}
.df-val{font-size:13.5px;color:var(--slate-800);line-height:1.5;}
.df-line{display:inline-block;width:44%;min-width:120px;height:0;border-bottom:1.5px dashed var(--gold-300);vertical-align:middle;margin-right:10px;}
.df-row.pending em{font-style:normal;font-size:12px;color:var(--slate-400);}
.modal-toggle{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap;}
.modal-toggle button{font-size:12.5px;font-weight:600;font-family:var(--font-head);padding:5px 11px;border-radius:8px;background:var(--slate-100);color:var(--slate-500);}
.modal-toggle button.on{background:var(--green-700);color:#fff;}
.modal-hint{font-size:12px;color:var(--slate-400);margin-left:4px;}
@media print{ .topbar,.browser-bar{display:none;} }

/* =================== B2 → B4 botón + B4 pantalla =================== */
.armar-card{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:linear-gradient(135deg,var(--green-700),var(--green-800));
  color:#fff;border-radius:14px;padding:15px 16px;box-shadow:0 8px 20px rgba(46,107,78,.26);transition:transform .14s,box-shadow .18s;}
.armar-card:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(46,107,78,.32);}
.armar-ico{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:none;}
.armar-ico.lg{width:46px;height:46px;border-radius:13px;background:var(--green-700);color:#fff;}
.armar-txt{flex:1;display:flex;flex-direction:column;gap:2px;}
.armar-txt strong{font-family:var(--font-head);font-weight:700;font-size:14.5px;}
.armar-txt em{font-style:normal;font-size:12px;opacity:.86;line-height:1.3;}

.b4-hero{display:flex;align-items:center;gap:15px;margin-bottom:16px;}
.b4-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:none;font-size:12.5px;color:var(--slate-500);}
.b4-legend{display:flex;gap:24px;padding:11px 16px;margin-bottom:14px;background:#fff;border:1px solid var(--slate-200);border-radius:12px;font-size:12.5px;color:var(--slate-600);font-weight:500;}
.b4-legend span{display:inline-flex;align-items:center;gap:8px;}
.b4-legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.b4-legend .dot.g{background:var(--green-500);} .b4-legend .dot.a{background:var(--gold-400);}

.b4-grid{display:grid;grid-template-columns:1fr 1.04fr;gap:16px;align-items:start;}
.b4-block{border-radius:15px;padding:16px 16px 18px;border:1px solid var(--slate-200);background:#fff;}
.b4-block.pre{background:linear-gradient(180deg,#F4FAF6,#fff);border-color:#CFE6D8;}
.b4-block.fill{background:linear-gradient(180deg,#FFF9EF,#fff);border-color:#F2DEB5;}
.b4-bhead{display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-weight:700;font-size:14px;padding-bottom:12px;margin-bottom:6px;border-bottom:1px solid var(--slate-100);}
.b4-bhead span{margin-left:auto;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:99px;}
.b4-bhead.g{color:var(--green-800);} .b4-bhead.g span{background:var(--green-100);color:var(--green-700);}
.b4-bhead.a{color:var(--gold-600);} .b4-bhead.a span{background:var(--gold-200);color:var(--gold-600);}

.ro-field{padding:11px 0;border-bottom:1px dashed #DCEAE1;}
.ro-field:last-child{border-bottom:none;}
.ro-label{font-size:11.5px;font-weight:600;color:var(--green-700);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.ro-val{font-size:13.5px;color:var(--slate-800);line-height:1.5;}
.ro-tag{display:inline-block;background:var(--green-100);color:var(--green-800);font-weight:600;font-size:12.5px;padding:3px 10px;border-radius:8px;}
.sug-note{font-style:normal;font-size:11.5px;color:var(--slate-400);margin-left:4px;}
.word-chip{font-size:11px;font-weight:600;color:var(--green-700);background:var(--green-50);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.word-chip.over{color:var(--red-600);background:var(--red-50);}
.ods-badge{display:inline-block;background:#E8F0FB;color:#345A8C;font-weight:700;font-size:12.5px;padding:4px 11px;border-radius:8px;}

.ed-field{margin-bottom:14px;}
.ed-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:10px;}
.ed-label{font-size:12.5px;font-weight:600;color:var(--slate-700);font-family:var(--font-head);}
.ai-btn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--gold-600);background:var(--gold-100);
  border:1px solid var(--gold-200);border-radius:99px;padding:4px 10px;font-family:var(--font-head);transition:all .14s;flex:none;}
.ai-btn:hover{background:var(--gold-200);}
.ed-ta,.ed-input{width:100%;border:1.5px solid var(--slate-200);border-radius:10px;padding:10px 12px;font-size:13.5px;color:var(--slate-800);
  outline:none;background:#fff;font-family:var(--font-body);transition:border-color .15s;}
.ed-ta{resize:vertical;line-height:1.5;}
.ed-ta:focus,.ed-input:focus{border-color:var(--gold-400);box-shadow:0 0 0 3px rgba(244,185,84,.16);}
.ed-input.sm{padding:8px 10px;font-size:12.5px;}
.date-lbl{flex:1;display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--slate-500);font-weight:600;}
.stu-list{display:flex;flex-direction:column;gap:7px;}
.stu-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 24px;gap:7px;align-items:center;}
.stu-row.head{font-size:10.5px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.04em;padding:0 2px;}
.stu-del{width:24px;height:24px;border-radius:7px;background:var(--slate-100);color:var(--slate-500);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
.stu-del:hover{background:var(--red-100);color:var(--red-600);}
.stu-add{align-self:flex-start;font-size:12.5px;font-weight:600;color:var(--gold-600);font-family:var(--font-head);padding:4px 2px;margin-top:2px;}

.b4-foot{margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
  background:#fff;border:1px solid var(--slate-200);border-radius:14px;padding:15px 18px;box-shadow:var(--shadow-sm);}
.firma-note{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--slate-500);max-width:520px;line-height:1.4;}
.firma-note svg{color:var(--green-700);flex:none;}
.b4-actions{display:flex;gap:10px;align-items:center;}
.b4-generate{display:inline-flex;align-items:center;gap:8px;background:var(--green-700);color:#fff;font-family:var(--font-head);font-weight:600;
  font-size:13.5px;border-radius:11px;padding:11px 18px;box-shadow:0 6px 16px rgba(46,107,78,.24);transition:background .15s;}
.b4-generate:hover{background:var(--green-800);}

.dash-top{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:#fff;border:1px solid var(--slate-200);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);}
.stat-card.hero{background:linear-gradient(140deg,var(--green-700),var(--green-800));border:none;}
.stat-card.hero .stat-num{color:#fff;}
.stat-card.hero .stat-lbl{color:rgba(255,255,255,.82);}
.stat-num{font-family:var(--font-head);font-weight:800;font-size:34px;color:var(--slate-900);line-height:1;}
.stat-lbl{font-size:12.5px;color:var(--slate-500);margin-top:6px;font-weight:500;}
.ring-bar{height:6px;background:var(--slate-100);border-radius:99px;margin-top:12px;overflow:hidden;}
.ring-bar div{height:100%;background:var(--green-600);border-radius:99px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.donut-wrap{display:flex;align-items:center;gap:20px;margin-top:14px;}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0;}
.dl-row{display:flex;align-items:center;gap:9px;}
.dl-dot{width:10px;height:10px;border-radius:3px;flex:none;}
.dl-label{flex:1;font-size:13px;color:var(--slate-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dl-val{font-size:13.5px;font-weight:700;color:var(--slate-800);font-family:var(--font-head);}
.dl-pct{font-size:11.5px;font-weight:600;color:var(--slate-400);width:34px;text-align:right;}
.hbar{flex:1;height:9px;background:var(--slate-100);border-radius:99px;overflow:hidden;}
.hbar div{height:100%;border-radius:99px;}

/* =================== BOTONES UNIFICADOS (CRM) =================== */
.gbtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-head);font-weight:600;
  font-size:14px;border-radius:12px;padding:12px 18px;transition:transform .12s ease, box-shadow .18s ease, background .16s ease, border-color .16s;white-space:nowrap;}
.gbtn:active{transform:translateY(1px);}
.gbtn-sm{font-size:13px;padding:9px 14px;border-radius:10px;}
.gbtn-primary{background:var(--green-700);color:#fff;box-shadow:0 6px 16px rgba(46,107,78,.26);}
.gbtn-primary:hover{background:var(--green-800);box-shadow:0 8px 20px rgba(46,107,78,.32);}
.gbtn-secondary{background:#fff;color:var(--green-700);border:1.5px solid var(--green-300);box-shadow:var(--shadow-sm);}
.gbtn-secondary:hover{background:var(--green-50);border-color:var(--green-500);}
.gbtn-ghost{background:#fff;color:var(--slate-600);border:1.5px solid var(--slate-200);box-shadow:var(--shadow-sm);}
.gbtn-ghost:hover{border-color:var(--slate-300);color:var(--slate-800);}
.gbtn-wa{background:#1FA855;color:#fff;box-shadow:0 6px 16px rgba(31,168,85,.28);text-decoration:none;}
.gbtn-wa:hover{background:#178A46;}
.gbtn.busy,.gbtn.disabled,.gbtn:disabled{opacity:.7;cursor:default;pointer-events:none;}
.gbtn.gbtn-wa.disabled{background:var(--slate-200);color:var(--slate-400);box-shadow:none;}

.senal-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--gold-600);background:var(--gold-100);
  border:1px solid var(--gold-200);padding:3px 9px;border-radius:99px;font-family:var(--font-head);}

/* =================== STEPPER HORIZONTAL (B2) =================== */
.stepper-h{display:flex;align-items:flex-start;margin:6px 0 14px;}
.sh-cell{display:flex;align-items:center;flex:1;}
.sh-cell:first-child{flex:0 0 auto;}
.sh-node{display:flex;flex-direction:column;align-items:center;gap:7px;flex:none;width:78px;}
.sh-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;
  background:#fff;border:2px solid var(--slate-200);color:var(--slate-400);font-family:var(--font-head);font-weight:700;font-size:14px;}
.sh-node.done .sh-dot{background:var(--green-600);border-color:var(--green-600);color:#fff;}
.sh-node.cur .sh-dot{background:#fff;border-color:var(--green-600);color:var(--green-700);box-shadow:0 0 0 4px var(--green-50);}
.sh-lbl{font-size:12px;font-weight:600;color:var(--slate-400);font-family:var(--font-head);text-align:center;line-height:1.15;}
.sh-node.done .sh-lbl,.sh-node.cur .sh-lbl{color:var(--slate-700);}
.sh-line{flex:1;height:2.5px;background:var(--slate-200);border-radius:2px;margin-top:16px;min-width:14px;}
.sh-line.on{background:var(--green-400,#5DAE83);}
.traza-note{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--slate-500);margin-bottom:16px;}
.traza-note svg{color:var(--green-600);flex:none;}

/* =================== TARJETA PASO ACTUAL =================== */
.paso-card{border:1.5px solid var(--green-300);background:linear-gradient(135deg,#F1F8F3,#FBFDFB);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow-sm);}
.paso-card.warn{border-color:var(--gold-300);background:linear-gradient(135deg,#FDF6E8,#FFFDF8);}
.paso-card.done{border-color:var(--slate-200);background:#fff;}
.paso-eyebrow{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  color:var(--green-700);font-family:var(--font-head);margin-bottom:8px;}
.paso-eyebrow.warn{color:var(--gold-600);}
.paso-card.done .paso-eyebrow{color:var(--slate-500);}
.draft-flag{color:var(--gold-600);font-weight:700;}
.paso-title{font-size:21px;color:var(--slate-900);letter-spacing:-.02em;}
.paso-desc{font-size:14px;line-height:1.55;color:var(--slate-600);margin:7px 0 0;max-width:740px;}
.paso-desc strong{color:var(--slate-800);}
.paso-actions{margin-top:16px;}
.paso-actions .gbtn{font-size:15px;padding:14px 22px;}
.paso-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:13px;font-weight:600;color:var(--green-700);font-family:var(--font-head);}
.paso-link:hover{color:var(--green-800);}
.derive-line{display:flex;align-items:flex-end;gap:12px;margin-top:16px;flex-wrap:wrap;}
.derive-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:220px;font-size:12px;font-weight:600;color:var(--slate-500);font-family:var(--font-head);}
.derive-line .gbtn{flex:none;}
.paso-card .crm-ta{margin-top:14px;}

.kv-pend{font-size:13px;font-weight:600;color:var(--gold-600);}
.raw-quote{display:flex;flex-direction:column;gap:3px;margin-top:12px;background:var(--gold-100);border:1px solid var(--gold-200);border-radius:12px;padding:11px 14px;}
.raw-label{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-600);font-family:var(--font-head);}
.raw-text{font-size:13.5px;color:var(--slate-700);font-style:italic;line-height:1.4;}
.sr-now{margin-left:auto;font-size:10px;font-weight:700;color:var(--green-700);background:var(--green-50);padding:2px 8px;border-radius:99px;font-family:var(--font-head);letter-spacing:.03em;}

/* =================== MODAL DE CORREO =================== */
.modal-scrim{position:fixed;inset:0;background:rgba(20,18,14,.45);backdrop-filter:blur(3px);z-index:120;display:flex;align-items:center;justify-content:center;padding:30px;}
.mail-modal{width:min(560px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;}
.mail-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--slate-100);position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;}
.mail-ico{width:38px;height:38px;border-radius:11px;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;}
.mail-x{width:30px;height:30px;border-radius:9px;color:var(--slate-400);font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;flex:none;}
.mail-x:hover{background:var(--slate-100);color:var(--slate-700);}
.mail-body{padding:18px 20px;display:flex;flex-direction:column;gap:9px;}
.mail-to{display:flex;gap:10px;font-size:13px;color:var(--slate-700);}
.mail-k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--slate-400);min-width:54px;flex:none;padding-top:1px;}
.mail-summary{background:var(--slate-50);border:1px solid var(--slate-200);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--slate-600);line-height:1.7;margin-top:4px;}
.mail-att-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--slate-400);margin-top:6px;}
.mail-att{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--slate-200);border-radius:11px;padding:11px 13px;font-size:13px;font-weight:600;color:var(--slate-700);}
.att-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;flex:none;font-family:var(--font-head);}
.att-ico.pdf{background:var(--red-600);} .att-ico.csv{background:var(--green-600);}
.mail-honest{display:flex;gap:9px;font-size:12px;color:var(--gold-600);background:var(--gold-100);border:1px solid var(--gold-200);border-radius:12px;padding:12px 14px;line-height:1.45;margin-top:6px;}
.mail-honest svg{flex:none;margin-top:1px;}
.mail-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--slate-100);position:sticky;bottom:0;background:#fff;border-radius:0 0 18px 18px;}

/* =================== B4 REDISEÑO =================== */
.b4-main{padding-bottom:96px;}
.b4-crumb{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.b4-crumb .crm-back{margin:0;}
.b4-crumb-sep{color:var(--slate-300);font-size:16px;}
.b4-crumb-step{font-size:13px;font-weight:600;color:var(--slate-600);font-family:var(--font-head);display:inline-flex;align-items:center;gap:8px;}
.b4-crumb-num{font-size:11px;font-weight:700;color:var(--gold-600);background:var(--gold-100);border:1px solid var(--gold-200);padding:3px 9px;border-radius:99px;letter-spacing:.02em;}

.b4-progress{background:#fff;border:1px solid var(--slate-200);border-radius:15px;padding:15px 18px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
.b4-prog-top{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:14px;color:var(--slate-700);font-weight:500;}
.b4-prog-top strong{font-family:var(--font-head);font-weight:800;font-size:18px;color:var(--green-700);}
.b4-prog-top strong.full{color:var(--green-600);}
.b4-prog-hint{font-size:12.5px;color:var(--slate-400);font-weight:500;}
.b4-prog-track{height:10px;background:var(--slate-100);border-radius:99px;overflow:hidden;margin:10px 0;}
.b4-prog-fill{height:100%;background:linear-gradient(90deg,var(--green-500),var(--green-700));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.1,1);}
.b4-prog-faltan{display:flex;gap:7px;font-size:12.5px;color:var(--gold-600);line-height:1.4;}
.b4-prog-faltan svg{flex:none;margin-top:1px;} .b4-prog-faltan strong{color:var(--gold-600);}
.b4-prog-done{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--green-700);}

.b4-grid{display:grid;grid-template-columns:1fr 1.04fr;gap:16px;align-items:start;}
.b4-bhead span{margin-left:auto;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:99px;}
.ro-field.missing{background:linear-gradient(90deg,rgba(244,185,84,.10),transparent 60%);border-radius:8px;padding-left:8px;margin-left:-8px;}
.ro-missing{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--gold-600);}

/* campo ámbar: estado pendiente / hecho */
.ed-field.done .ed-ta,.ed-field.done .ed-input{border-color:var(--green-300);background:#FAFDFB;}
.ed-check{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--green-600);color:#fff;margin-right:5px;vertical-align:-3px;}
.pend-pill{font-size:9.5px;font-weight:800;letter-spacing:.05em;color:var(--gold-600);background:var(--gold-200);padding:2px 7px;border-radius:99px;font-family:var(--font-head);vertical-align:1px;margin-left:5px;}
.ai-btn.busy{opacity:.8;cursor:default;}
.ai-btn[disabled]{cursor:default;}
.ai-spin{width:11px;height:11px;border-radius:50%;border:2px solid rgba(208,142,42,.35);border-top-color:var(--gold-600);animation:spin .7s linear infinite;display:inline-block;}
.ai-spin.dark{border-color:rgba(46,107,78,.3);border-top-color:var(--green-700);}
.gbtn-primary .ai-spin{border-color:rgba(255,255,255,.4);border-top-color:#fff;}

/* barra de acciones fija */
.b4-actionbar{position:sticky;bottom:0;z-index:40;margin:18px -30px -26px;padding:13px 30px 15px;
  background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--slate-200);
  display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;box-shadow:0 -6px 18px rgba(35,32,26,.05);}
.b4-actionbar .firma-note{max-width:360px;}
.b4-act-col{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.b4-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.b4-actions .gbtn-primary{font-size:14.5px;padding:13px 20px;}
.b4-act-div{width:1px;height:30px;background:var(--slate-200);margin:0 4px;}
.b4-act-hint{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--slate-400);text-align:right;}
.b4-act-hint svg{flex:none;color:var(--green-600);}
@media(max-width:880px){.b4-act-col{align-items:stretch;width:100%;}.b4-actions{justify-content:flex-start;}.b4-act-hint{text-align:left;}}

/* =================== MÓDULO WHATSAPP =================== */
.wa-card{border:1.5px solid #BFE6CD;border-radius:16px;background:linear-gradient(135deg,#F0FBF4,#FBFFFC);box-shadow:var(--shadow-sm);margin-bottom:16px;overflow:hidden;}
.wa-card.open{box-shadow:var(--shadow-md);}
.wa-head{display:flex;align-items:center;gap:13px;width:100%;padding:15px 18px;text-align:left;}
.wa-ico{width:42px;height:42px;border-radius:12px;background:#1FA855;color:#fff;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 12px rgba(31,168,85,.3);}
.wa-title{font-family:var(--font-head);font-weight:700;font-size:15.5px;color:var(--slate-900);}
.wa-sub{font-size:12.8px;color:var(--slate-500);margin-top:2px;line-height:1.4;max-width:680px;}
.wa-chev{color:var(--slate-400);flex:none;transition:transform .2s;}
.wa-body{padding:4px 18px 16px;}
.wa-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:980px){.wa-steps{grid-template-columns:1fr;}}
.wa-step{background:#fff;border:1px solid var(--slate-200);border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:9px;}
.wa-step.off{opacity:.55;}
.wa-step-h{display:flex;align-items:center;gap:9px;font-family:var(--font-head);font-weight:700;font-size:13.5px;color:var(--slate-800);}
.wa-step-n{width:23px;height:23px;border-radius:50%;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex:none;}
.wa-step-p{font-size:12px;color:var(--slate-500);line-height:1.45;margin:0;}
.wa-step .gbtn{align-self:flex-start;}
.wa-qbox{display:flex;flex-direction:column;gap:9px;background:var(--slate-50);border:1px solid var(--slate-200);border-radius:11px;padding:11px;margin-top:2px;}
.wa-q-t{font-size:12.5px;font-weight:600;color:var(--slate-800);line-height:1.35;}
.wa-q-opts{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
.wa-opt{font-size:11.8px;color:var(--slate-600);line-height:1.3;}
.wa-opt b{color:var(--green-700);}
.wa-resp{width:100%;border:1.5px solid var(--slate-200);border-radius:10px;padding:9px 11px;font-size:13px;color:var(--slate-800);outline:none;resize:vertical;font-family:var(--font-body);line-height:1.5;}
.wa-resp:focus{border-color:#1FA855;box-shadow:0 0 0 3px rgba(31,168,85,.14);}
.wa-resp:disabled{background:var(--slate-50);}
.wa-result{background:var(--green-50);border:1px solid var(--green-100);border-radius:11px;padding:11px;display:flex;flex-direction:column;gap:7px;margin-top:2px;}
.wa-result-h{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green-800);font-family:var(--font-head);}
.wa-result-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11.5px;line-height:1.3;}
.wa-r-q{color:var(--slate-500);}
.wa-r-arrow{color:var(--green-600);display:inline-flex;}
.wa-r-a{color:var(--slate-800);font-weight:600;}
.wa-r-field{color:var(--green-700);font-weight:600;font-family:var(--font-head);}
.wa-honest{display:flex;gap:9px;font-size:11.8px;color:var(--slate-600);background:#fff;border:1px dashed var(--slate-300);border-radius:11px;padding:11px 13px;line-height:1.5;margin-top:13px;}
.wa-honest svg{flex:none;margin-top:1px;color:var(--green-700);}
.wa-honest strong{color:var(--slate-800);}
</style>
